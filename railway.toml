# Monorepo: RAILWAY_SERVICE_NAME selects server vs web (see scripts/railway-*.sh).
[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && bash scripts/railway-build.sh"

[deploy]
startCommand = "bash scripts/railway-start.sh"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/health"
timeout = 120
