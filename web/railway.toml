# Railway config for @fallen-sparrow/web (static SPA).
# Works with Root Directory "web" or repo root (via scripts/railway-*.sh + RAILWAY_SERVICE_NAME).
[build]
builder = "nixpacks"
buildCommand = "cd .. && pnpm install --frozen-lockfile && bash scripts/railway-build.sh"

[deploy]
startCommand = "sh scripts/start-production.sh"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
